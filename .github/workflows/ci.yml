name: Tribe Backend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: tribe-backend-cicd-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEFAULT_IMAGE_REPOSITORY: vantagac/tribe-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve Docker Image Repository
        id: image
        run: |
          IMAGE_REPOSITORY="${DOCKER_IMAGE_REPOSITORY:-$DEFAULT_IMAGE_REPOSITORY}"
          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
        env:
          DOCKER_IMAGE_REPOSITORY: ${{ vars.DOCKER_IMAGE_REPOSITORY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Package API
        working-directory: ./backend
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean :api:bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
            ${{ steps.image.outputs.repository }}:latest
