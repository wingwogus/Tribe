apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tribe-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wingwogus/Tribe.git
    targetRevision: main
    path: ops/helm/tribe-api
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: tribe
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
