replicaCount: 2

image:
  repository: vantagac/tribe-api
  pullPolicy: IfNotPresent
  tag: "replace-with-commit-sha"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80
  metricsPort: 9090

containerPort: 8080
managementPort: 9090

env:
  SPRING_PROFILES_ACTIVE: prod

envFrom:
  - secretRef:
      name: tribe-api-secret
  - configMapRef:
      name: tribe-api-config

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: tribe-api-route
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: api.tribe.jaehyuns.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /actuator/prometheus

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
