apiVersion: v1
kind: ConfigMap
metadata:
  name: tribe-api-config
data:
  REDIS_HOST: "shared-redis-master.cache.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  # Frontend canonical origin used for CORS, OAuth callback redirects, and invite links.
  APP_URL: "https://tri-be.app"
  PROD_MAIL_FROM_NAME: "Tribe"
  DISCORD_WEBHOOK_URL: ""
