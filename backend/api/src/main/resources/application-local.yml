spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:tribe-local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  cloud:
    compatibility-verifier:
      enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:test@example.com}
    password: ${MAIL_PASSWORD:test-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_KEY:test-kakao-key}
            client-secret: ${KAKAO_CLIENT_SECRET:test-kakao-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}

# Base64 인코딩된 dummy key. (실서버에서는 secret을 프로필마다 override)
jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

app:
  mail:
    from-name: ${MAIL_FROM_NAME:Tribe}
  url: ${APP_URL:http://localhost:8081}
  auth:
    cookie:
      secure: false
      same-site: Lax

google:
  maps:
    key: ${GOOGLE_KEY:test-google-key}

gemini:
  api:
    key: ${GEMINI_API_KEY:test-gemini-key}
    url: ${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

exchange:
  rate:
    api-url: ${EXCHANGE_RATE_API_URL:https://oapi.koreaexim.go.kr}
    key: ${EXCHANGE_RATE_API_KEY:test-exchange-key}

cloudinary:
  url: ${CLOUDINARY_URL:cloudinary://test:test@test}

discord:
  webhook-url: ${DISCORD_WEBHOOK_URL:}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000

chat:
  redis:
    enabled: true

trip:
  realtime:
    enabled: true
