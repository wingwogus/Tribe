spring:
  datasource:
    url: jdbc:h2:mem:tribe-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: test@example.com
    password: test-password
    auth-code-expiration-millis: 1800000
    verified-state-expiration-millis: 1800000
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-key
            client-secret: test-kakao-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - profile_image
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

jwt:
  secret: t2oRk29vBQZWS8GEt4xr8AJznlPK0ipBKUwdyqe10SOGZB26vVBMjzqualdJsjcOY1wX9DOqJC9V1DFl58F0tQ==

app:
  url: http://localhost:3000
  auth:
    cookie:
      secure: false
      same-site: Lax

cloudinary:
  url: cloudinary://test:test@test

google:
  maps:
    key: test-google-key

gemini:
  api:
    key: test-gemini-key
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

ollama:
  api:
    url: http://localhost:11434/api/generate
  model: gemma3

chat:
  redis:
    enabled: false

trip:
  realtime:
    enabled: false

tribe:
  auth:
    enabled: true
  community:
    image:
      enabled: true
  itinerary:
    place-search:
      enabled: true
  trip:
    review:
      enabled: true
      ai:
        provider: gemini
